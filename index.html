<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0000">

    <!-- SEO -->
    <title>Empire AI</title>
    <meta name="description" content="Empire AI – Intelligent solutions powered by AI." />

    <!-- Styles -->
    <link rel="stylesheet" href="/src/index.css">

    <style>
      #root {
        padding-top: env(safe-area-inset-top);
      }

      /* SPLASH */
      #splash {
        position: fixed;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, #200000, #0a0000);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }

      /* LOGO */
      .logo {
        width: 130px;
        animation: bounce 1.5s infinite, glowPulse 2s infinite;
      }

      /* BOUNCE */
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
      }

      /* 🔴 GLOW ANIMATION */
      @keyframes glowPulse {
        0% {
          filter: drop-shadow(0 0 10px #8B0000)
                  drop-shadow(0 0 20px #8B0000);
        }
        50% {
          filter: drop-shadow(0 0 20px #ff0000)
                  drop-shadow(0 0 40px #ff0000);
        }
        100% {
          filter: drop-shadow(0 0 10px #8B0000)
                  drop-shadow(0 0 20px #8B0000);
        }
      }
    </style>
  </head>

  <body>
    <!-- SPLASH SCREEN -->
    <div id="splash">
      <img src="/icon-192.png" class="logo" />
    </div>

    <!-- REACT ROOT -->
    <div id="root"></div>

    <!-- MAIN -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- REMOVE SPLASH SMOOTH -->
    <script>
      window.addEventListener("load", () => {
        setTimeout(() => {
          const splash = document.getElementById("splash");
          if (splash) {
            splash.style.opacity = "0";
            setTimeout(() => splash.remove(), 500);
          }
        }, 2000);
      });
    </script>
  </body>
</html>
