<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Empire AI</title>

<style>
body { margin:0; overflow:hidden; }

/* SPLASH */
#splash {
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle, #200000, #000);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* LOGO */
.logo {
  width:130px;
  animation: bounce 1.5s infinite, glow 2s infinite;
}

/* GLOW */
@keyframes glow {
  0% { filter: drop-shadow(0 0 10px #8B0000); }
  50% { filter: drop-shadow(0 0 40px red); }
  100% { filter: drop-shadow(0 0 10px #8B0000); }
}

/* BOUNCE */
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* SWORD */
.sword {
  position:absolute;
  width:220px;
  top:50%;
  left:-300px;
  transform: rotate(45deg);
  z-index:3;
}

/* TRAIL */
.trail {
  position:absolute;
  width:300px;
  height:4px;
  background: linear-gradient(90deg, transparent, red, transparent);
  transform: rotate(45deg);
  top:50%;
  left:-300px;
  opacity:0;
}

/* FLASH */
.flash {
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
}

/* SMOKE */
.smoke {
  position:absolute;
  width:200px;
  height:200px;
  background: radial-gradient(circle, rgba(255,0,0,0.3), transparent);
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  opacity:0;
}

/* PARTICLES */
canvas {
  position:absolute;
  top:0;
  left:0;
}

/* ANIMATION */
@keyframes slash {
  0% { left:-300px; }
  100% { left:120%; }
}

@keyframes trailAnim {
  0% { left:-300px; opacity:1; }
  100% { left:120%; opacity:0; }
}

@keyframes flashAnim {
  0% { opacity:0; }
  50% { opacity:1; }
  100% { opacity:0; }
}

@keyframes smokeAnim {
  0% { opacity:0; transform:translate(-50%, -50%) scale(0.5); }
  50% { opacity:1; }
  100% { opacity:0; transform:translate(-50%, -50%) scale(1.5); }
}
</style>
</head>

<body>

<div id="splash">
  <img src="/icon-192.png" class="logo" id="logo">

  <img src="/sword.png" class="sword" id="sword">
  <div class="trail" id="trail"></div>

  <div class="flash" id="flash"></div>
  <div class="smoke" id="smoke"></div>

  <canvas id="particles"></canvas>

  <audio id="sound" src="/sword.mp3"></audio>
</div>

<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>

<script>
window.addEventListener("load", () => {

  const sword = document.getElementById("sword");
  const trail = document.getElementById("trail");
  const flash = document.getElementById("flash");
  const smoke = document.getElementById("smoke");
  const logo = document.getElementById("logo");
  const splash = document.getElementById("splash");
  const sound = document.getElementById("sound");

  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  function createParticles() {
    for (let i = 0; i < 40; i++) {
      const x = canvas.width / 2;
      const y = canvas.height / 2;

      const dx = (Math.random() - 0.5) * 15;
      const dy = (Math.random() - 0.5) * 15;

      ctx.fillStyle = "red";
      ctx.fillRect(x + dx, y + dy, 4, 4);
    }
  }

  // ⚔️ SLASH START
  setTimeout(() => {
    sword.style.animation = "slash 0.5s linear forwards";
    trail.style.animation = "trailAnim 0.5s linear forwards";
  }, 1500);

  // 💥 IMPACT MOMENT
  setTimeout(() => {
    flash.style.animation = "flashAnim 0.3s";
    smoke.style.animation = "smokeAnim 1s";

    createParticles();

    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);

    sound.play();

    // screen shake
    document.body.style.transform = "translateX(5px)";
    setTimeout(() => document.body.style.transform = "translateX(-5px)", 50);
    setTimeout(() => document.body.style.transform = "translateX(0)", 100);

    // logo hit reaction
    logo.style.transform = "scale(1.3) rotate(-5deg)";
  }, 1700);

  // 🎬 EXIT
  setTimeout(() => {
    splash.style.transition = "0.5s";
    splash.style.opacity = "0";
    setTimeout(() => splash.remove(), 500);
  }, 2300);

});
</script>

</body>
</html>
